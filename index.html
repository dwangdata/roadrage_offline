<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>FleetSense - Route Intelligence System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet"/>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <div class="nav-links">
      <a href="/" class="active">📍 Live Tracking</a>
      <a href="/route-planner">🗺️ Route Planner</a>
    </div>
    
    <h1>FleetSense - Route Intelligence</h1>
    <div id="status" aria-live="polite">Ready to monitor routes.</div>

    <div class="controls">
      <button id="startButton" class="btn-sm">Start Trip</button>
      <button id="stopButton" class="btn-sm" disabled>Stop Trip</button>
      <button id="deleteDataButton" class="btn-sm">Clear All Data</button>

      <!-- Documentation + Recording -->
      <button id="viewfinderToggle" class="btn-sm" aria-label="Toggle viewfinder and start/stop recording">
        ▶︎ Document Route
      </button>
      <span id="recIndicator" class="rec-dot hidden" aria-hidden="true"></span>
    </div>

    <div id="dataPointsCounter">Route Data Points: 0</div>

    <!-- Main map (Leaflet visible map) -->
    <div id="map"></div>

    <!-- Android fallback: compositor canvas replaces visible map while recording -->
    <div id="compositorWrap" class="hidden">
      <canvas id="compositorCanvas"></canvas>
    </div>

    <!-- Rear camera viewfinder (visible in desktop path; hidden in Android compositor while recording) -->
    <div id="viewfinderContainer" class="hidden">
      <video id="viewfinder" playsinline muted></video>
    </div>

    <!-- Live road condition chart -->
    <canvas id="vibrationChart" height="200" style="width:100%; margin-bottom:20px;"></canvas>

    <h2>Previous Trips</h2>
    <ul id="pastRidesList"></ul>

    <!-- Download link after recording -->
    <div id="downloadRow" class="hidden">
      <a id="lastRecordingLink" download>Download last trip recording</a>
    </div>
  </div>

  <!-- Trip Detail Overlay -->
  <div id="rideDetailView" class="hidden">
    <div class="detail-header">
      <h3>Trip Details</h3>
      <button id="closeDetailButton" class="btn-sm">Close</button>
    </div>

    <div id="recapMap" style="height:300px; width:100%; margin-bottom:20px;"></div>
    <canvas id="recapChart" height="200" style="width:100%; margin-bottom:20px;"></canvas>
    <pre id="detailContent"></pre>
  </div>

  <!-- Libraries -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <script src="script.js"></script>
</body>
</html>
