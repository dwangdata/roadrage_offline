<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Bike Roughness Mapper MVP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet"/>

  <!-- Leaflet (desktop / general map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- MapLibre GL (Android fallback map rendered to canvas) -->
  <link href="https://unpkg.com/maplibre-gl@4.5.2/dist/maplibre-gl.css" rel="stylesheet" />

  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>Bike Roughness Mapper</h1>
    <div id="status" aria-live="polite">Ready to record.</div>

    <div class="controls">
      <button id="startButton" class="btn-sm">Start Ride</button>
      <button id="stopButton" class="btn-sm" disabled>Stop Ride</button>
      <button id="deleteDataButton" class="btn-sm">Clear All Data</button>
      <button id="bellButton" class="btn-sm" aria-label="Ring bell and say 'On your left'">Bell</button>

      <!-- Viewfinder + Recording -->
      <button id="viewfinderToggle" class="btn-sm" aria-label="Toggle viewfinder and start/stop recording">
        ▶︎ Viewfinder + Record
      </button>
      <span id="recIndicator" class="rec-dot hidden" aria-hidden="true"></span>
    </div>

    <div id="dataPointsCounter">Data Points: 0</div>

    <!-- Main map (Leaflet for desktop / general) -->
    <div id="map"></div>

    <!-- Android fallback: compositor canvas replaces map+viewfinder on screen while recording -->
    <div id="compositorWrap" class="hidden">
      <canvas id="compositorCanvas"></canvas>
    </div>

    <!-- Rear camera viewfinder (visible in desktop path; hidden in Android compositor while recording) -->
    <div id="viewfinderContainer" class="hidden">
      <video id="viewfinder" playsinline muted></video>
    </div>

    <!-- Live vibration chart -->
    <canvas id="vibrationChart" height="200" style="width:100%; margin-bottom:20px;"></canvas>

    <h2>Past Rides</h2>
    <ul id="pastRidesList"></ul>

    <!-- Download link after recording -->
    <div id="downloadRow" class="hidden">
      <a id="lastRecordingLink" download>Download last recording</a>
    </div>
  </div>

  <!-- Ride Detail Overlay -->
  <div id="rideDetailView" class="hidden">
    <div class="detail-header">
      <h3>Ride Details</h3>
      <button id="closeDetailButton" class="btn-sm">Close</button>
    </div>

    <div id="recapMap" style="height:300px; width:100%; margin-bottom:20px;"></div>
    <canvas id="recapChart" height="200" style="width:100%; margin-bottom:20px;"></canvas>
    <pre id="detailContent"></pre>
  </div>

  <!-- Libraries -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <!-- MapLibre GL (used only in Android compositor mode) -->
  <script src="https://unpkg.com/maplibre-gl@4.5.2/dist/maplibre-gl.js"></script>

  <script src="script.js"></script>
</body>
</html>
