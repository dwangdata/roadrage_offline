services:
  - type: web
    name: roadrage-offline
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: RENDER
        value: true
    domains:
      - roadrage-offline.onrender.com